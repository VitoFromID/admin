<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inbox — Vito</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy-deep:  #020818;
      --navy-dark:  #040f2d;
      --navy-mid:   #071445;
      --navy-light: #0d1f6e;
      --blue:       #2563eb;
      --blue-light: #3b82f6;
      --blue-glow:  #60a5fa;
      --cyan:       #06b6d4;
      --cyan-light: #67e8f9;
      --white:      #f0f4ff;
      --white-dim:  rgba(240,244,255,0.6);
      --white-soft: rgba(240,244,255,0.15);
      --white-mist: rgba(240,244,255,0.06);
      --border:     rgba(96,165,250,0.15);
      --border-bright: rgba(96,165,250,0.35);
      --red:        #ef4444;
      --red-dim:    rgba(239,68,68,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      background: var(--navy-deep);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(96,165,250,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,165,250,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* ══════════════════════════
       LOGIN
    ══════════════════════════ */
    #login {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
    }

    /* Animated orbs */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(37,99,235,0.2), transparent 70%);
      top: -100px; left: -100px;
      animation: orbDrift 12s ease-in-out infinite;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(6,182,212,0.15), transparent 70%);
      bottom: -80px; right: -80px;
      animation: orbDrift 15s ease-in-out infinite reverse;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(96,165,250,0.1), transparent 70%);
      top: 40%; left: 60%;
      animation: orbDrift 10s ease-in-out infinite 3s;
    }
    @keyframes orbDrift {
      0%, 100% { transform: translate(0,0); }
      33%       { transform: translate(30px,-20px); }
      66%       { transform: translate(-20px,15px); }
    }

    .login-card {
      position: relative; z-index: 2;
      width: 380px; max-width: 92vw;
      background: rgba(7,20,69,0.7);
      border: 1px solid var(--border-bright);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px rgba(96,165,250,0.05), 0 32px 80px rgba(2,8,24,0.6);
      animation: cardIn .8s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Glowing top border */
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue-glow), transparent);
      border-radius: 100%;
    }

    .login-badge {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--white-mist); border: 1px solid var(--border);
      border-radius: 100px; padding: .35rem 1rem;
      font-size: .7rem; letter-spacing: .15em; text-transform: uppercase;
      color: var(--blue-glow); margin-bottom: 1.8rem;
    }

    .login-badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 6px var(--cyan);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .login-card h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem; font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, #fff 0%, var(--blue-glow) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .3rem;
    }

    .login-card p {
      font-size: .8rem; color: var(--white-dim);
      letter-spacing: .05em; margin-bottom: 2.2rem;
    }

    .input-group {
      position: relative; margin-bottom: 1rem;
    }

    .input-group input {
      width: 100%; padding: 1rem 1.2rem;
      background: var(--white-mist);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--white); font-size: 1rem;
      font-family: 'Inter', sans-serif;
      text-align: center; letter-spacing: .25em;
      outline: none; transition: border-color .25s, box-shadow .25s;
      autocomplete: off;
    }

    .input-group input:focus {
      border-color: var(--blue-light);
      box-shadow: 0 0 0 3px rgba(59,130,246,.15), 0 0 20px rgba(59,130,246,.1);
    }

    .input-group input::placeholder { color: rgba(240,244,255,.2); letter-spacing: .05em; }

    .btn-masuk {
      width: 100%; padding: 1rem;
      background: linear-gradient(135deg, var(--blue) 0%, #1d4ed8 100%);
      border: none; border-radius: 12px;
      color: #fff; font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 600;
      letter-spacing: .05em; cursor: pointer;
      box-shadow: 0 4px 24px rgba(37,99,235,.4), 0 0 0 1px rgba(96,165,250,.2);
      transition: all .2s; position: relative; overflow: hidden;
    }

    .btn-masuk::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.1), transparent);
    }

    .btn-masuk:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(37,99,235,.5), 0 0 0 1px rgba(96,165,250,.3); }
    .btn-masuk:active { transform: scale(.97); }

    .login-err {
      margin-top: .9rem; font-size: .82rem;
      color: #fca5a5; display: flex; align-items: center;
      justify-content: center; gap: .4rem;
      opacity: 0; transform: translateY(4px);
      transition: all .3s; min-height: 1.6rem;
    }
    .login-err.show { opacity: 1; transform: translateY(0); }

    /* ══════════════════════════
       ADMIN
    ══════════════════════════ */
    #admin { display: none; position: relative; z-index: 1; }

    /* Top nav */
    .topnav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.5rem;
      background: rgba(4,15,45,.8);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 10;
    }

    .nav-brand {
      display: flex; align-items: center; gap: .75rem;
    }

    .nav-logo {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: .95rem;
      box-shadow: 0 0 16px rgba(37,99,235,.4);
    }

    .nav-title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1.1rem; letter-spacing: -.02em;
    }

    .nav-right { display: flex; align-items: center; gap: .75rem; }

    .nav-pill {
      background: var(--white-mist); border: 1px solid var(--border);
      border-radius: 100px; padding: .3rem .9rem;
      font-size: .75rem; color: var(--blue-glow); letter-spacing: .05em;
      display: flex; align-items: center; gap: .4rem;
    }

    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 6px var(--cyan);
      animation: blink 2s ease-in-out infinite;
    }

    .btn-out {
      background: var(--white-mist); border: 1px solid var(--border);
      border-radius: 8px; padding: .4rem .9rem;
      color: var(--white-dim); font-size: .78rem;
      cursor: pointer; transition: all .2s;
      font-family: 'Inter', sans-serif; letter-spacing: .03em;
    }
    .btn-out:hover { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: #fca5a5; }

    /* Hero stats */
    .hero {
      padding: 3rem 1.5rem 2.5rem;
      max-width: 900px; margin: 0 auto;
    }

    .hero-label {
      font-size: .72rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--blue-glow); opacity: .7; margin-bottom: .8rem;
      display: flex; align-items: center; gap: .5rem;
    }

    .hero-label::before {
      content: ''; display: inline-block;
      width: 24px; height: 1px; background: var(--blue-glow); opacity: .5;
    }

    .hero-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(2rem, 6vw, 3.2rem);
      letter-spacing: -.04em; line-height: 1.1;
      margin-bottom: 2rem;
    }

    .hero-title span {
      background: linear-gradient(135deg, var(--blue-glow) 0%, var(--cyan-light) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1rem; margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--white-mist); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.4rem 1.2rem;
      position: relative; overflow: hidden;
      transition: border-color .2s;
    }

    .stat-card:hover { border-color: var(--border-bright); }

    .stat-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue-glow), transparent);
      opacity: .5;
    }

    .stat-icon { font-size: 1.4rem; margin-bottom: .6rem; display: block; }
    .stat-val {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 2rem; letter-spacing: -.04em;
      background: linear-gradient(135deg, #fff, var(--blue-glow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1;
      margin-bottom: .3rem;
    }
    .stat-label { font-size: .72rem; color: var(--white-dim); letter-spacing: .04em; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    .section-title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1rem; letter-spacing: -.02em;
      color: var(--white-dim);
    }

    .btn-refresh {
      display: flex; align-items: center; gap: .4rem;
      background: var(--white-mist); border: 1px solid var(--border);
      border-radius: 8px; padding: .5rem 1rem;
      color: var(--blue-glow); font-size: .78rem;
      cursor: pointer; transition: all .2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-refresh:hover { background: rgba(37,99,235,.15); border-color: var(--blue-light); }
    .spin { display: inline-block; transition: transform .5s; }
    .btn-refresh:hover .spin { transform: rotate(180deg); }

    /* MSG CARDS */
    .msg-list { max-width: 900px; margin: 0 auto; padding: 0 1.5rem 5rem; }

    .msg-card {
      background: var(--white-mist);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 1.4rem 1.5rem;
      margin-bottom: .9rem;
      animation: fadeUp .4s cubic-bezier(.16,1,.3,1) both;
      transition: border-color .2s, box-shadow .2s, transform .2s;
      position: relative; overflow: hidden;
    }

    .msg-card::before {
      content: ''; position: absolute;
      left: 0; top: 20%; bottom: 20%; width: 2px;
      background: linear-gradient(180deg, transparent, var(--blue-glow), transparent);
      opacity: 0; transition: opacity .2s;
    }

    .msg-card:hover {
      border-color: var(--border-bright);
      box-shadow: 0 0 0 1px rgba(96,165,250,.1), 0 8px 32px rgba(2,8,24,.4);
      transform: translateX(4px);
    }

    .msg-card:hover::before { opacity: 1; }

    .msg-card:nth-child(1){animation-delay:.05s}
    .msg-card:nth-child(2){animation-delay:.1s}
    .msg-card:nth-child(3){animation-delay:.15s}
    .msg-card:nth-child(4){animation-delay:.2s}
    .msg-card:nth-child(5){animation-delay:.25s}

    .msg-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }

    .msg-meta { display: flex; align-items: center; gap: .6rem; }

    .msg-num {
      background: rgba(37,99,235,.2); border: 1px solid rgba(59,130,246,.3);
      border-radius: 6px; padding: .2rem .55rem;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: .72rem; color: var(--blue-glow); letter-spacing: .04em;
    }

    .msg-from {
      font-size: .75rem; color: var(--white-dim); letter-spacing: .05em;
    }

    .btn-del {
      background: transparent; border: 1px solid rgba(239,68,68,.25);
      border-radius: 8px; padding: .3rem .7rem;
      color: rgba(239,68,68,.6); font-size: .72rem;
      cursor: pointer; transition: all .2s;
      font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: .3rem;
    }
    .btn-del:hover { background: var(--red-dim); border-color: var(--red); color: var(--red); }

    .msg-body {
      font-size: .97rem; line-height: 1.85;
      color: rgba(240,244,255,.85); white-space: pre-wrap;
      margin-bottom: 1rem;
    }

    .msg-foot {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: .75rem; border-top: 1px solid var(--border);
    }

    .msg-time {
      font-size: .7rem; color: var(--white-dim);
      display: flex; align-items: center; gap: .35rem;
    }

    .msg-glyph { color: var(--blue-glow); font-size: .8rem; opacity: .6; }

    /* EMPTY */
    .empty {
      text-align: center; padding: 5rem 2rem;
      max-width: 900px; margin: 0 auto;
    }
    .empty-box {
      background: var(--white-mist); border: 1px solid var(--border);
      border-radius: 24px; padding: 3rem 2rem; display: inline-block;
    }
    .empty-ico { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .empty h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: .4rem; }
    .empty p { font-size: .85rem; color: var(--white-dim); }

    /* LOADING */
    .loading { text-align: center; padding: 4rem 2rem; }
    .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 1rem; }
    .dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--blue-glow);
      animation: db 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2){animation-delay:.2s}
    .dots span:nth-child(3){animation-delay:.4s}
    @keyframes db{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
    .loading p { font-size: .85rem; color: var(--white-dim); }

    /* MODAL HAPUS */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(2,8,24,.8); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--navy-mid); border: 1px solid var(--border-bright);
      border-radius: 20px; padding: 2.5rem 2rem; text-align: center;
      width: 320px; max-width: 92vw;
      box-shadow: 0 0 0 1px rgba(96,165,250,.05), 0 32px 80px rgba(2,8,24,.8);
      transform: scale(.9) translateY(12px); transition: transform .3s cubic-bezier(.16,1,.3,1);
      position: relative;
    }

    .modal::before {
      content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }

    .overlay.show .modal { transform: scale(1) translateY(0); }

    .modal-ico { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
    .modal h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: .5rem; }
    .modal p { font-size: .82rem; color: var(--white-dim); margin-bottom: 1.8rem; }

    .modal-btns { display: flex; gap: .75rem; }

    .btn-cancel {
      flex: 1; padding: .85rem; border: 1px solid var(--border);
      border-radius: 10px; background: transparent; color: var(--white-dim);
      font-size: .9rem; cursor: pointer; transition: all .2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-cancel:hover { background: var(--white-mist); color: var(--white); }

    .btn-confirm {
      flex: 1; padding: .85rem; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #ef4444, #b91c1c); color: #fff;
      font-size: .9rem; cursor: pointer;
      box-shadow: 0 4px 16px rgba(239,68,68,.3);
      transition: opacity .2s; font-family: 'Syne', sans-serif; font-weight: 600;
    }
    .btn-confirm:hover { opacity: .88; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--navy-mid); border: 1px solid var(--border-bright);
      border-radius: 100px; padding: .65rem 1.6rem;
      font-size: .83rem; letter-spacing: .03em;
      opacity: 0; transition: all .35s; pointer-events: none;
      z-index: 9999; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(2,8,24,.6);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }

    @media(max-width:600px){
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .stat-grid .stat-card:last-child { grid-column: 1/-1; }
    }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-badge">
      <span class="login-badge-dot"></span>
      Private Access
    </div>
    <h1>INBOX</h1>
    <p>Masukkan password untuk melanjutkan</p>
    <div class="input-group">
      <input type="password" id="pwd" placeholder="password" autocomplete="off"/>
    </div>
    <button class="btn-masuk" id="btn-login">MASUK →</button>
    <div class="login-err" id="err">⚠ Password salah, coba lagi</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">

  <!-- Topnav -->
  <nav class="topnav">
    <div class="nav-brand">
      <div class="nav-logo">V</div>
      <span class="nav-title">Inbox</span>
    </div>
    <div class="nav-right">
      <div class="nav-pill">
        <span class="live-dot"></span>
        Live
      </div>
      <button class="btn-out" id="btn-logout">Keluar</button>
    </div>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <p class="hero-label">Dashboard</p>
    <h1 class="hero-title">Pesan dari <span>Riska</span></h1>

    <div class="stat-grid">
      <div class="stat-card">
        <span class="stat-icon">💬</span>
        <div class="stat-val" id="total">0</div>
        <div class="stat-label">Total Pesan</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">🕐</span>
        <div class="stat-val" id="last-date">—</div>
        <div class="stat-label">Terakhir Masuk</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">📅</span>
        <div class="stat-val" id="last-time">—</div>
        <div class="stat-label">Jam Terakhir</div>
      </div>
    </div>

    <div class="toolbar">
      <span class="section-title">Semua Pesan</span>
      <button class="btn-refresh" id="btn-refresh">
        <span class="spin">↻</span> Refresh
      </button>
    </div>
  </div>

  <div class="msg-list" id="msg-list">
