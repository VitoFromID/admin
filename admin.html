<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Pesan Masuk</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --rose:        #D4748E;
    --rose-light:  #F2B8C6;
    --rose-pale:   #FDE8EF;
    --blush:       #FAF0F3;
    --mauve:       #7C4A5C;
    --mauve-dark:  #4B2336;
    --gold:        #C9956A;
    --cream:       #FFF8F9;
    --text-dark:   #2E1520;
    --text-mid:    #6B3F52;
    --text-soft:   #A07080;
    --ff-display:  'Playfair Display', Georgia, serif;
    --ff-body:     'Lato', system-ui, sans-serif;
    --danger:      #C0455C;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--cream);
    color: var(--text-dark);
    font-family: var(--ff-body);
    min-height: 100vh;
    padding: 32px 16px 80px;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-family: var(--ff-display);
    color: var(--mauve-dark);
    font-size: 1.9rem;
    margin: 0 0 6px;
  }

  header p {
    color: var(--text-soft);
    margin: 0;
    font-size: 0.9rem;
  }

  /* LOGIN GATE */
  #login-screen {
    max-width: 360px;
    margin: 80px auto;
    background: #fff;
    border: 1px solid var(--rose-pale);
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(212,116,142,0.12);
  }
  #login-screen h2 {
    font-family: var(--ff-display);
    color: var(--mauve-dark);
    margin: 0 0 18px;
  }
  #login-screen input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--rose-light);
    font-family: var(--ff-body);
    font-size: 0.95rem;
    margin-bottom: 12px;
    outline: none;
    background: var(--blush);
    color: var(--text-dark);
  }
  #login-screen input:focus { border-color: var(--rose); }
  #login-screen button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--rose);
    color: #fff;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  #login-screen button:hover { background: var(--mauve); }
  #login-error {
    color: var(--danger);
    font-size: 0.85rem;
    margin-top: 10px;
    min-height: 1em;
  }

  .hidden { display: none !important; }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .count-badge {
    background: var(--rose-pale);
    color: var(--mauve-dark);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .toolbar-actions { display: flex; gap: 8px; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--rose-light);
    color: var(--text-mid);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: var(--ff-body);
    transition: all 0.2s;
  }
  .btn-ghost:hover { background: var(--rose-pale); }

  /* MESSAGE LIST */
  #msg-list { display: flex; flex-direction: column; gap: 14px; }

  .msg-card {
    background: #fff;
    border: 1px solid var(--rose-pale);
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: 0 4px 16px rgba(212,116,142,0.07);
    position: relative;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .msg-card.removing {
    opacity: 0;
    transform: translateX(20px);
  }

  .msg-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .msg-from {
    font-weight: 700;
    color: var(--rose);
    font-size: 0.85rem;
  }
  .msg-date {
    color: var(--text-soft);
    font-size: 0.78rem;
  }
  .msg-text {
    color: var(--text-dark);
    font-size: 0.96rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0 0 12px;
  }

  .msg-actions { display: flex; justify-content: flex-end; }
  .btn-delete {
    background: none;
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: var(--ff-body);
    font-weight: 700;
    transition: all 0.2s;
  }
  .btn-delete:hover { background: var(--danger); color: #fff; }
  .btn-delete:disabled { opacity: 0.5; cursor: not-allowed; }

  .empty-state, .loading-state {
    text-align: center;
    color: var(--text-soft);
    padding: 60px 20px;
    font-size: 0.95rem;
  }

  .empty-state span { font-size: 2rem; display: block; margin-bottom: 10px; }

  /* CONFIRM MODAL */
  #confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(75,35,54,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  #confirm-box {
    background: #fff;
    border-radius: 16px;
    padding: 26px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  #confirm-box p { color: var(--text-mid); margin: 0 0 20px; font-size: 0.95rem; }
  .confirm-buttons { display: flex; gap: 10px; }
  .confirm-buttons button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--ff-body);
  }
  #confirm-yes { background: var(--danger); color: #fff; }
  #confirm-no { background: var(--blush); color: var(--text-mid); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--mauve-dark);
    color: #fff;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 0.85rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 60;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

  <!-- LOGIN GATE -->
  <div id="login-screen">
    <h2>Admin Login</h2>
    <input type="password" id="admin-pass" placeholder="Masukkan password" autocomplete="off" />
    <button id="login-btn">Masuk</button>
    <p id="login-error"></p>
  </div>

  <!-- ADMIN PANEL -->
  <div class="wrap hidden" id="admin-panel">
    <header>
      <h1>💌 Pesan Masuk</h1>
      <p>Panel admin untuk melihat & mengelola pesan dari pengunjung</p>
    </header>

    <div class="toolbar">
      <span class="count-badge" id="count-badge">0 pesan</span>
      <div class="toolbar-actions">
        <button class="btn-ghost" id="refresh-btn">↻ Refresh</button>
        <button class="btn-ghost" id="logout-btn">Keluar</button>
      </div>
    </div>

    <div id="msg-list">
      <div class="loading-state">Memuat pesan...</div>
    </div>
  </div>

  <!-- CONFIRM DELETE MODAL -->
  <div id="confirm-overlay" class="hidden">
    <div id="confirm-box">
      <p>Yakin mau hapus pesan ini? Tindakan ini tidak bisa dibatalkan.</p>
      <div class="confirm-buttons">
        <button id="confirm-no">Batal</button>
        <button id="confirm-yes">Hapus</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import {
      getFirestore, collection, query, orderBy,
      onSnapshot, doc, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

    // ── FIREBASE CONFIG (sama dengan project utama) ──────────
    const firebaseConfig = {
      apiKey: "AIzaSyD0zNcrTjHg7K7X_2jW7XtUys2CQYxQ5Nc",
      authDomain: "letters-for-me.firebaseapp.com",
      projectId: "letters-for-me",
      storageBucket: "letters-for-me.firebasestorage.app",
      messagingSenderId: "1037502814265",
      appId: "1:1037502814265:web:60b59d292d1e9c339095e8"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ── SIMPLE PASSWORD GATE ──────────────────────────────────
    // Ganti password ini sesuai keinginanmu.
    const ADMIN_PASSWORD = "riska2026";
    const SESSION_KEY = "admin_authed";

    const loginScreen  = document.getElementById('login-screen');
    const adminPanel   = document.getElementById('admin-panel');
    const passInput    = document.getElementById('admin-pass');
    const loginBtn      = document.getElementById('login-btn');
    const loginError   = document.getElementById('login-error');
    const logoutBtn    = document.getElementById('logout-btn');

    function showAdmin() {
      loginScreen.classList.add('hidden');
      adminPanel.classList.remove('hidden');
      initMessages();
    }

    if (sessionStorage.getItem(SESSION_KEY) === 'true') {
      showAdmin();
    }

    loginBtn.addEventListener('click', tryLogin);
    passInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });

    function tryLogin() {
      if (passInput.value === ADMIN_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, 'true');
        loginError.textContent = '';
        showAdmin();
      } else {
        loginError.textContent = 'Password salah, coba lagi.';
        passInput.value = '';
      }
    }

    logoutBtn.addEventListener('click', () => {
      sessionStorage.removeItem(SESSION_KEY);
      location.reload();
    });

    // ── MESSAGES ───────────────────────────────────────────────
    const msgList    = document.getElementById('msg-list');
    const countBadge = document.getElementById('count-badge');
    const refreshBtn = document.getElementById('refresh-btn');
    const toast      = document.getElementById('toast');

    const confirmOverlay = document.getElementById('confirm-overlay');
    const confirmYes = document.getElementById('confirm-yes');
    const confirmNo  = document.getElementById('confirm-no');
    let pendingDeleteId = null;

    let unsubscribe = null;

    function initMessages() {
      if (unsubscribe) return; // sudah listening
      const q = query(collection(db, 'messages'), orderBy('createdAt', 'desc'));
      unsubscribe = onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
          msgList.innerHTML = `<div class="empty-state"><span>🕊️</span>Belum ada pesan masuk.</div>`;
          countBadge.textContent = '0 pesan';
          return;
        }
        countBadge.textContent = `${snapshot.size} pesan`;
        msgList.innerHTML = '';
        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          msgList.appendChild(renderMessageCard(docSnap.id, data));
        });
      }, (err) => {
        console.error(err);
        msgList.innerHTML = `<div class="empty-state">Gagal memuat pesan. Coba refresh.</div>`;
      });
    }

    function formatDate(ts) {
      if (!ts || !ts.toDate) return '—';
      const d = ts.toDate();
      return d.toLocaleString('id-ID', {
        day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function renderMessageCard(id, data) {
      const card = document.createElement('div');
      card.className = 'msg-card';
      card.dataset.id = id;

      const metaFrom = document.createElement('div');
      metaFrom.className = 'msg-meta';
      metaFrom.innerHTML = `
        <span class="msg-from">${escapeHtml(data.from || 'Anonim')}</span>
        <span class="msg-date">${formatDate(data.createdAt)}</span>
      `;

      const text = document.createElement('p');
      text.className = 'msg-text';
      text.textContent = data.text || '';

      const actions = document.createElement('div');
      actions.className = 'msg-actions';
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete';
      delBtn.textContent = 'Hapus';
      delBtn.addEventListener('click', () => askDelete(id));
      actions.appendChild(delBtn);

      card.appendChild(metaFrom);
      card.appendChild(text);
      card.appendChild(actions);
      return card;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function askDelete(id) {
      pendingDeleteId = id;
      confirmOverlay.classList.remove('hidden');
    }

    confirmNo.addEventListener('click', () => {
      pendingDeleteId = null;
      confirmOverlay.classList.add('hidden');
    });

    confirmYes.addEventListener('click', async () => {
      if (!pendingDeleteId) return;
      const id = pendingDeleteId;
      confirmOverlay.classList.add('hidden');

      const card = msgList.querySelector(`.msg-card[data-id="${id}"]`);
      if (card) card.classList.add('removing');

      try {
        await deleteDoc(doc(db, 'messages', id));
        showToast('Pesan berhasil dihapus');
      } catch (err) {
        console.error(err);
        showToast('Gagal menghapus pesan');
        if (card) card.classList.remove('removing');
      }
      pendingDeleteId = null;
    });

    refreshBtn.addEventListener('click', () => {
      // onSnapshot sudah realtime, tapi beri feedback visual
      showToast('Pesan diperbarui');
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }
  </script>
</body>
    </html>
