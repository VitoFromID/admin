<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inbox — Vito</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rose:       #D4748E;
      --rose-light: #F2B8C6;
      --rose-pale:  #FDE8EF;
      --mauve:      #7C4A5C;
      --mauve-dark: #4B2336;
      --gold:       #C9956A;
      --cream:      #FFF8F9;
      --blush:      #FAF0F3;
      --text-dark:  #2E1520;
      --text-soft:  #A07080;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      background: var(--blush);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #1a0a10 0%, #2e1220 50%, #1a0a10 100%);
      position: relative;
      overflow: hidden;
    }

    #login-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(212,116,142,0.15) 0%, transparent 70%);
    }

    .login-box {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(212,116,142,0.25);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      width: 340px;
      backdrop-filter: blur(16px);
      animation: fadeUp 0.8s ease both;
    }

    .login-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
    }

    .login-box h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 2.4rem;
      color: var(--rose-light);
      margin-bottom: 0.25rem;
      text-shadow: 0 0 30px rgba(212,116,142,0.4);
    }

    .login-box p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .pwd-wrap {
      position: relative;
      margin-bottom: 1.2rem;
    }

    .login-box input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 12px;
      border: 1px solid rgba(212,116,142,0.3);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 1rem;
      outline: none;
      text-align: center;
      letter-spacing: 0.2em;
      transition: border-color 0.2s;
    }

    .login-box input:focus { border-color: var(--rose); }
    .login-box input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }

    .login-btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 100px;
      background: linear-gradient(135deg, var(--rose) 0%, var(--mauve) 100%);
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(212,116,142,0.3);
    }

    .login-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .login-btn:active { transform: scale(0.97); }

    .login-error {
      color: var(--rose-light);
      font-size: 0.82rem;
      margin-top: 0.8rem;
      min-height: 1.2em;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .login-error.show { opacity: 1; }

    /* ── ADMIN PAGE ── */
    #admin-page { display: none; min-height: 100vh; }

    /* Header */
    .admin-header {
      background: linear-gradient(160deg, #2e1220 0%, #4b2336 60%, #7c4a5c 100%);
      padding: 3rem 1.5rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .admin-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 60% at 50% 30%, rgba(212,116,142,0.15) 0%, transparent 70%);
    }

    .header-inner { position: relative; z-index: 1; }

    .header-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.8rem;
    }

    .admin-header h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(2rem, 6vw, 3rem);
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .admin-header h1 span {
      color: var(--rose-light);
    }

    .header-sub {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      margin-top: 0.3rem;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .stat-pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(212,116,142,0.25);
      border-radius: 100px;
      padding: 0.5rem 1.3rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      backdrop-filter: blur(8px);
    }

    .stat-pill strong {
      color: var(--rose-light);
      font-weight: 700;
      margin-right: 0.3rem;
    }

    /* Wave divider */
    .wave {
      display: block;
      width: 100%;
      height: 48px;
      background: var(--blush);
      clip-path: ellipse(55% 100% at 50% 100%);
      margin-top: -1px;
    }

    /* Content */
    .admin-content {
      max-width: 680px;
      margin: 0 auto;
      padding: 1rem 1.5rem 5rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .toolbar-label {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.2rem;
      border: 1.5px solid var(--rose-light);
      border-radius: 100px;
      background: transparent;
      color: var(--rose);
      font-family: 'Lato', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, color 0.2s;
    }

    .refresh-btn:hover { background: var(--rose); color: #fff; border-color: var(--rose); }

    .refresh-icon { font-size: 0.95rem; transition: transform 0.4s; }
    .refresh-btn:hover .refresh-icon { transform: rotate(180deg); }

    /* Empty */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-soft);
    }

    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .empty-state p { font-style: italic; font-size: 1rem; }

    /* Message cards */
    .msg-card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem 1.6rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 20px rgba(124,74,92,0.07);
      border-left: 3px solid var(--rose-light);
      position: relative;
      animation: fadeUp 0.5s ease both;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .msg-card:hover {
      box-shadow: 0 6px 28px rgba(124,74,92,0.13);
      transform: translateY(-2px);
    }

    .msg-card:nth-child(1) { animation-delay: 0.05s; }
    .msg-card:nth-child(2) { animation-delay: 0.1s; }
    .msg-card:nth-child(3) { animation-delay: 0.15s; }
    .msg-card:nth-child(4) { animation-delay: 0.2s; }
    .msg-card:nth-child(5) { animation-delay: 0.25s; }

    .msg-number {
      position: absolute;
      top: -0.6rem;
      left: 1.2rem;
      background: var(--rose);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      letter-spacing: 0.05em;
    }

    .msg-text {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text-dark);
      margin-bottom: 0.8rem;
      white-space: pre-wrap;
    }

    .msg-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .msg-time {
      font-size: 0.73rem;
      color: var(--text-soft);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .msg-heart { color: var(--rose-light); font-size: 0.85rem; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-soft);
    }

    .loading-dots span {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--rose-light);
      border-radius: 50%;
      margin: 0 3px;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1); opacity: 1; }
    }

    /* Footer */
    .admin-footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.78rem;
      color: var(--text-soft);
      letter-spacing: 0.05em;
    }

    /* Logout */
    .logout-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--mauve-dark);
      color: rgba(255,255,255,0.7);
      border: none;
      border-radius: 100px;
      padding: 0.6rem 1.2rem;
      font-size: 0.78rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s;
      display: none;
    }

    .logout-btn:hover { background: var(--mauve); color: #fff; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 400px) {
      .login-box { width: 90vw; padding: 2.5rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <span class="login-icon">🤍</span>
      <h1>Inbox Vito</h1>
      <p>masukkan password untuk masuk</p>
      <div class="pwd-wrap">
        <input type="password" id="pwd-input" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="login-btn" id="login-btn">Masuk</button>
      <p class="login-error" id="login-error">Password salah 🌸</p>
    </div>
  </div>

  <!-- ADMIN PAGE -->
  <div id="admin-page">

    <div class="admin-header">
      <div class="header-inner">
        <p class="header-eyebrow">private inbox</p>
        <h1>Pesan dari <span>Riska</span></h1>
        <p class="header-sub">semua pesan yang masuk dari halaman ulang tahun</p>
        <div class="stats-bar">
          <div class="stat-pill"><strong id="total-count">0</strong> pesan masuk</div>
          <div class="stat-pill" id="last-time-pill">belum ada pesan</div>
        </div>
      </div>
    </div>

    <div class="wave"></div>

    <div class="admin-content">
      <div class="toolbar">
        <span class="toolbar-label">semua pesan</span>
        <button class="refresh-btn" id="refresh-btn">
          <span class="refresh-icon">↻</span> Refresh
        </button>
      </div>

      <div id="msg-list">
        <div class="loading">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>

    <div class="admin-footer">dibuat dengan 🤍 untuk Vito</div>
    <button class="logout-btn" id="logout-btn">Keluar</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD0zNcrTjHg7K7X_2jW7XtUys2CQYxQ5Nc",
      authDomain: "letters-for-me.firebaseapp.com",
      projectId: "letters-for-me",
      storageBucket: "letters-for-me.firebasestorage.app",
      messagingSenderId: "1037502814265",
      appId: "1:1037502814265:web:60b59d292d1e9c339095e8"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const ADMIN_PASSWORD = 'vito2026';

    const loginScreen  = document.getElementById('login-screen');
    const adminPage    = document.getElementById('admin-page');
    const pwdInput     = document.getElementById('pwd-input');
    const loginBtn     = document.getElementById('login-btn');
    const loginError   = document.getElementById('login-error');
    const msgList      = document.getElementById('msg-list');
    const totalCount   = document.getElementById('total-count');
    const lastTimePill = document.getElementById('last-time-pill');
    const refreshBtn   = document.getElementById('refresh-btn');
    const logoutBtn    = document.getElementById('logout-btn');

    // Login
    loginBtn.addEventListener('click', tryLogin);
    pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    function tryLogin() {
      if (pwdInput.value === ADMIN_PASSWORD) {
        loginScreen.style.opacity = '0';
        loginScreen.style.transition = 'opacity 0.6s ease';
        setTimeout(() => {
          loginScreen.style.display = 'none';
          adminPage.style.display   = 'block';
          logoutBtn.style.display   = 'block';
          loadMessages();
        }, 600);
      } else {
        loginError.classList.add('show');
        pwdInput.value = '';
        pwdInput.focus();
        setTimeout(() => loginError.classList.remove('show'), 3000);
      }
    }

    // Logout
    logoutBtn.addEventListener('click', () => {
      adminPage.style.display   = 'none';
      logoutBtn.style.display   = 'none';
      loginScreen.style.display = 'flex';
      loginScreen.style.opacity = '1';
      pwdInput.value = '';
    });

    // Refresh
    refreshBtn.addEventListener('click', () => {
      refreshBtn.querySelector('.refresh-icon').style.transform = 'rotate(360deg)';
      setTimeout(() => refreshBtn.querySelector('.refresh-icon').style.transform = '', 500);
      loadMessages();
    });

    async function loadMessages() {
      msgList.innerHTML = `
        <div class="loading">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>`;

      try {
        const q    = query(collection(db, 'messages'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);

        if (snap.empty) {
          msgList.innerHTML = `
            <div class="empty-state">
              <span class="empty-icon">🌸</span>
              <p>Belum ada pesan dari Riska</p>
            </div>`;
          totalCount.textContent   = '0';
          lastTimePill.textContent = 'belum ada pesan';
          return;
        }

        totalCount.textContent = snap.size;
        msgList.innerHTML = '';

        let idx = 1;
        snap.forEach(doc => {
          const d    = doc.data();
          const date = d.createdAt?.toDate ? d.createdAt.toDate() : null;
          const timeStr = date
            ? date.toLocaleString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
            : '—';

          if (idx === 1 && date) {
            lastTimePill.textContent = 'terakhir ' + date.toLocaleString('id-ID', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
          }

          const card = document.createElement('div');
          card.className = 'msg-card';
          card.innerHTML = `
            <div class="msg-number">#${idx}</div>
            <p class="msg-text">${escapeHtml(d.text)}</p>
            <div class="msg-footer">
              <span class="msg-time">🕐 ${timeStr}</span>
              <span class="msg-heart">♡</span>
            </div>
          `;
          msgList.appendChild(card);
          idx++;
        });

      } catch (err) {
        msgList.innerHTML = `<div class="empty-state"><span class="empty-icon">⚠️</span><p>Gagal memuat: ${err.message}</p></div>`;
      }
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
  </html>
